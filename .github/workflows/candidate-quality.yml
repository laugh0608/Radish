name: Candidate Quality

on:
  workflow_call:
  workflow_dispatch:
  schedule:
    - cron: '30 18 * * 0'

permissions:
  contents: read

concurrency:
  group: candidate-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  candidate-quality:
    name: Candidate Quality
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      RADISH_TEST_POSTGRES_CONNECTION_STRING: Host=localhost;Port=5432;Database=postgres;Username=postgres;Password=postgres;Pooling=false
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install frontend dependencies
        run: npm ci

      - name: Restore .NET dependencies
        run: dotnet restore Radish.slnx --disable-parallel

      - name: Run candidate quality gate
        run: npm run validate:candidate
