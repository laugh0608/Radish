name: Repo Quality

on:
  pull_request:
    branches:
      - master
      - dev
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repo-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-hygiene:
    name: Repo Hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Collect changed files
        run: node Scripts/collect-changed-files.mjs --base="${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}" --head="${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}" --include-all-on-empty-base --write=changed-files.txt

      - name: Check repository hygiene
        shell: bash
        run: node Scripts/check-repo-hygiene.mjs --stdin-z < changed-files.txt

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Collect changed files
        run: node Scripts/collect-changed-files.mjs --base="${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}" --head="${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}" --include-all-on-empty-base --write=changed-files.txt

      - name: Run frontend lint
        shell: bash
        run: node Scripts/lint-frontend-changed.mjs --stdin-z < changed-files.txt

  baseline-quick:
    name: Baseline Quick
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run quick baseline validation
        run: npm run validate:baseline:quick

  identity-guard:
    name: Identity Guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Collect changed files
        run: node Scripts/collect-changed-files.mjs --base="${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}" --head="${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}" --include-all-on-empty-base --write=changed-files.txt

      - name: Detect identity impact
        id: identity-impact
        shell: bash
        run: node Scripts/check-identity-impact.mjs --stdin-z --format=github-output < changed-files.txt >> "$GITHUB_OUTPUT"

      - name: Setup .NET SDK
        if: steps.identity-impact.outputs.impacted == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install dependencies
        if: steps.identity-impact.outputs.impacted == 'true'
        run: npm ci

      - name: Run identity regression validation
        if: steps.identity-impact.outputs.impacted == 'true'
        run: npm run validate:identity

      - name: Skip identity guard when unaffected
        if: steps.identity-impact.outputs.impacted != 'true'
        shell: bash
        run: |
          echo "Identity Guard skipped: no identity-related files changed."
