name: Docker Images

on:
  push:
    tags:
      - 'v*-dev'
      - 'v*-test'
      - 'v*-release'
  workflow_dispatch:
    inputs:
      push_backend:
        description: Push backend images to GHCR when current ref is a v*-dev / v*-test / v*-release tag
        required: false
        type: boolean
        default: false
      push_frontend:
        description: Push frontend image to GHCR when current ref is a v*-dev / v*-test / v*-release tag
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-images-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  prepare:
    name: Prepare Image Vars
    runs-on: ubuntu-latest
    outputs:
      image_namespace: ${{ steps.vars.outputs.image_namespace }}
      should_push_backend: ${{ steps.vars.outputs.should_push_backend }}
      should_push_frontend: ${{ steps.vars.outputs.should_push_frontend }}
      publish_track: ${{ steps.vars.outputs.publish_track }}
    steps:
      - name: Compute image namespace and publish mode
        id: vars
        shell: bash
        env:
          DISPATCH_PUSH_BACKEND: ${{ github.event.inputs.push_backend || 'false' }}
          DISPATCH_PUSH_FRONTEND: ${{ github.event.inputs.push_frontend || 'false' }}
        run: |
          owner_lc="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image_namespace="${REGISTRY}/${owner_lc}"
          should_push_backend=false
          should_push_frontend=false
          publish_track=invalid

          case "${GITHUB_REF_NAME}" in
            v*-dev)
              publish_track=dev
              ;;
            v*-test)
              publish_track=test
              ;;
            v*-release)
              publish_track=release
              ;;
          esac

          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${publish_track}" != "invalid" ]]; then
            should_push_backend=true
            should_push_frontend=true
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${publish_track}" != "invalid" ]]; then
            if [[ "${DISPATCH_PUSH_BACKEND}" == "true" ]]; then
              should_push_backend=true
            fi

            if [[ "${DISPATCH_PUSH_FRONTEND}" == "true" ]]; then
              should_push_frontend=true
            fi
          fi

          {
            echo "image_namespace=${image_namespace}"
            echo "should_push_backend=${should_push_backend}"
            echo "should_push_frontend=${should_push_frontend}"
            echo "publish_track=${publish_track}"
          } >> "$GITHUB_OUTPUT"

  backend-images:
    name: Backend Image (${{ matrix.image_name }})
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.should_push_backend == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: radish-dbmigrate
            dockerfile: Radish.DbMigrate/Dockerfile
          - image_name: radish-api
            dockerfile: Radish.Api/Dockerfile
          - image_name: radish-auth
            dockerfile: Radish.Auth/Dockerfile
          - image_name: radish-gateway
            dockerfile: Radish.Gateway/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        shell: bash
        env:
          IMAGE_NAMESPACE: ${{ needs.prepare.outputs.image_namespace }}
          IMAGE_NAME: ${{ matrix.image_name }}
          PUBLISH_TRACK: ${{ needs.prepare.outputs.publish_track }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          image="${IMAGE_NAMESPACE}/${IMAGE_NAME}"

          case "${PUBLISH_TRACK}" in
            dev)
              printf -v tags '%s\n%s' \
                "${image}:${REF_NAME}" \
                "${image}:dev-latest"
              ;;
            test)
              printf -v tags '%s\n%s' \
                "${image}:${REF_NAME}" \
                "${image}:test-latest"
              ;;
            release)
              printf -v tags '%s\n%s' \
                "${image}:${REF_NAME}" \
                "${image}:latest"
              ;;
            *)
              echo "Unsupported publish track: ${PUBLISH_TRACK}" >&2
              exit 1
              ;;
          esac

          {
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and maybe push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            BUILD_CONFIGURATION=Release
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.ref.name=${{ github.ref_name }}

  frontend-image:
    name: Frontend Image
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.should_push_frontend == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        shell: bash
        env:
          IMAGE_NAMESPACE: ${{ needs.prepare.outputs.image_namespace }}
          IMAGE_NAME: radish-frontend
          PUBLISH_TRACK: ${{ needs.prepare.outputs.publish_track }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          image="${IMAGE_NAMESPACE}/${IMAGE_NAME}"

          case "${PUBLISH_TRACK}" in
            dev)
              printf -v tags '%s\n%s' \
                "${image}:${REF_NAME}" \
                "${image}:dev-latest"
              ;;
            test)
              printf -v tags '%s\n%s' \
                "${image}:${REF_NAME}" \
                "${image}:test-latest"
              ;;
            release)
              printf -v tags '%s\n%s' \
                "${image}:${REF_NAME}" \
                "${image}:latest"
              ;;
            *)
              echo "Unsupported publish track: ${PUBLISH_TRACK}" >&2
              exit 1
              ;;
          esac

          {
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and maybe push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Frontend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.ref.name=${{ github.ref_name }}
