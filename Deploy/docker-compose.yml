services:
  frontend:
    image: ${RADISH_FRONTEND_IMAGE:-radish/frontend:local}
    expose:
      - "80"

  api:
    image: ${RADISH_API_IMAGE:-radish/api:local}
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5100
    volumes:
      - ../DataBases:/app/DataBases
      - ../Logs:/app/Logs
    expose:
      - "5100"

  auth:
    image: ${RADISH_AUTH_IMAGE:-radish/auth:local}
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5200
    volumes:
      - ../DataBases:/app/DataBases
      - ../Logs:/app/Logs
    expose:
      - "5200"

  gateway:
    image: ${RADISH_GATEWAY_IMAGE:-radish/gateway:local}
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      DownstreamServices__ApiService__BaseUrl: http://api:5100
      DownstreamServices__AuthService__BaseUrl: http://auth:5200
      ReverseProxy__Clusters__apiCluster__Destinations__api__Address: http://api:5100
      ReverseProxy__Clusters__authCluster__Destinations__auth__Address: http://auth:5200
      ReverseProxy__Clusters__frontendCluster__Destinations__frontend__Address: http://frontend
      ReverseProxy__Clusters__consoleCluster__Destinations__console__Address: http://frontend
    depends_on:
      - frontend
      - api
      - auth
    expose:
      - "5000"
