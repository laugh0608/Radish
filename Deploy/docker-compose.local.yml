services:
  dbmigrate:
    build:
      context: ..
      dockerfile: Radish.DbMigrate/Dockerfile
      args:
        BUILD_CONFIGURATION: Release

  frontend:
    build:
      context: ..
      dockerfile: Frontend/Dockerfile
    environment:
      RADISH_PUBLIC_URL: https://localhost:5000
      VITE_API_BASE_URL: https://localhost:5000
      VITE_AUTH_BASE_URL: https://localhost:5000
      VITE_SIGNALR_HUB_URL: https://localhost:5000
      VITE_AUTH_SERVER_URL: https://localhost:5000

  auth:
    build:
      context: ..
      dockerfile: Radish.Auth/Dockerfile
      args:
        BUILD_CONFIGURATION: Release
    environment:
      RADISH_PUBLIC_URL: https://localhost:5000
      OpenIddict__Server__Issuer: https://localhost:5000
      OpenIddict__Server__AllowInsecureHttp: "true"
      OpenIddict__Encryption__SigningCertificatePath: /app/certs/dev-auth-cert.pfx
      OpenIddict__Encryption__SigningCertificatePassword: RadishDevCert123!
      OpenIddict__Encryption__EncryptionCertificatePath: /app/certs/dev-auth-cert.pfx
      OpenIddict__Encryption__EncryptionCertificatePassword: RadishDevCert123!

  api:
    build:
      context: ..
      dockerfile: Radish.Api/Dockerfile
      args:
        BUILD_CONFIGURATION: Release
    environment:
      RADISH_PUBLIC_URL: https://localhost:5000
      OpenIddict__Encryption__SigningCertificatePath: /app/certs/dev-auth-cert.pfx
      OpenIddict__Encryption__SigningCertificatePassword: RadishDevCert123!
    volumes:
      - ../Certs:/app/certs:ro

  gateway:
    build:
      context: ..
      dockerfile: Radish.Gateway/Dockerfile
      args:
        BUILD_CONFIGURATION: Release
    environment:
      RADISH_PUBLIC_URL: https://localhost:5000
      ASPNETCORE_URLS: https://+:5000
      Kestrel__Certificates__Default__Path: /app/certs/dev-gateway-cert.pfx
      Kestrel__Certificates__Default__Password: RadishDevCert123!
      GatewayRuntime__EnableHttpsRedirection: "true"
      GatewayService__PublicUrl: https://localhost:5000
      FrontendService__BaseUrl: https://localhost:5000
    ports:
      - "5000:5000"
